<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Detail | tasty things.</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0; padding: 40px 20px;
            line-height: 1.8; color: #1a1a1a;
            max-width: 800px; margin: 0 auto;
        }
        .back-btn {
            text-decoration: none; color: #888; font-size: 0.9rem;
            display: inline-block; margin-bottom: 40px;
        }
        .detail-img {
            width: 100%; aspect-ratio: 16 / 9; object-fit: cover;
            margin-bottom: 40px; background-color: #f9f9f9;
        }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 20px; letter-spacing: -1px; }
        .tags { display: flex; gap: 10px; margin-bottom: 30px; }
        .tag { background: #f4f4f4; padding: 5px 15px; border-radius: 4px; font-size: 0.8rem; color: #666; }
        .recipe-content {
            font-size: 1.1rem; border-top: 1px solid #eee; padding-top: 30px;
            white-space: pre-wrap; /* 줄바꿈 유지 */
        }
        footer { margin-top: 80px; padding-top: 20px; border-top: 1px solid #eee; color: #999; font-size: 0.8rem; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back to Archive</a>

    <img id="detailImg" class="detail-img" src="" alt="">
    <div id="detailTags" class="tags"></div>
    <h1 id="detailTitle"></h1>
    <div id="detailRecipe" class="recipe-content"></div>

    <footer>© Tasty Things Archive.</footer>

    <script>
        // 로컬 스토리지에서 데이터 가져오기
        const data = localStorage.getItem('currentPost');
        
        if (data) {
            const post = JSON.parse(data);
            
            document.title = `${post.title} | tasty things.`;
            document.getElementById('detailTitle').innerText = post.title;
            document.getElementById('detailImg').src = post.img;
            document.getElementById('detailRecipe').innerText = post.recipe;
            
            // 태그 생성
            const tagsContainer = document.getElementById('detailTags');
            post.tags.forEach(tag => {
                const span = document.createElement('span');
                span.className = 'tag';
                span.innerText = tag;
                tagsContainer.appendChild(span);
            });
        } else {
            // 데이터가 없으면 메인으로 리다이렉트
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
