<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tasty things.</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-sub: #888888;
            --tag-bg: #f4f4f4;
            --accent: #000000;
            --overlay: rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 20px; color: var(--text-main);
            line-height: 1.6;
        }

        /* 헤더 & 검색 */
        header { max-width: 1200px; margin: 60px auto 40px; text-align: center; }
        h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 30px; text-transform: lowercase; }
        .search-bar { padding: 15px 25px; border: 1px solid #eeeeee; border-radius: 50px; width: 100%; max-width: 400px; outline: none; }

        /* 레이아웃 */
        .archive-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; max-width: 1200px; margin: 0 auto; }
        .column-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 30px; padding-bottom: 10px; border-bottom: 2px solid #000; text-transform: uppercase; }

        /* 카드 (클릭 가능하도록 커서 추가) */
        .card { background: var(--card-bg); margin-bottom: 40px; cursor: pointer; transition: opacity 0.2s; }
        .card:hover { opacity: 0.8; }
        .card-img { width: 100%; aspect-ratio: 4 / 5; object-fit: cover; background-color: #f9f9f9; margin-bottom: 15px; }
        .card-title { font-size: 1.1rem; font-weight: 700; margin: 0 0 10px 0; }
        .card-desc { font-size: 0.95rem; color: var(--text-sub); margin-bottom: 15px; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { font-size: 0.75rem; background: var(--tag-bg); padding: 4px 12px; border-radius: 4px; color: #555; }

        /* 모달 팝업 스타일 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay); z-index: 1000; justify-content: center; align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: white; max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto;
            padding: 40px; border-radius: 0; position: relative;
        }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; cursor: pointer; border: none; background: none; }
        .recipe-text { white-space: pre-wrap; margin-top: 20px; color: #333; line-height: 1.8; }

        @media (max-width: 900px) { .archive-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>tasty things.</h1>
    <div class="search-container">
        <input type="text" id="searchInput" class="search-bar" placeholder="영감 검색 (태그, 제목)..." onkeyup="filterPosts()">
    </div>
</header>

<div class="archive-container">
    <div class="column" id="cooking-col"><div class="column-title">Cooking</div><div class="items"></div></div>
    <div class="column" id="travel-col"><div class="column-title">Travel</div><div class="items"></div></div>
    <div class="column" id="space-col"><div class="column-title">Space</div><div class="items"></div></div>
</div>

<div id="recipeModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="close-modal" onclick="closeModal()">&times;</button>
        <h2 id="modalTitle"></h2>
        <div id="modalRecipe" class="recipe-text"></div>
    </div>
</div>

<script>
    const posts = [
        {
            category: 'cooking',
            title: '보들보들 감자스프',
            desc: '비 오는 날 생각나는 따뜻하고 고소한 맛.',
            img: 'https://images.unsplash.com/photo-1547592166-23ac45744acd?auto=format&fit=crop&w=600',
            tags: ['#PotatoSoup', '#Recipe'],
            recipe: "1. 감자 3개를 삶아 으깹니다.\n2. 볶은 양파와 함께 블렌더에 넣습니다.\n3. 우유 200ml와 생크림 100ml를 넣고 끓입니다.\n4. 소금, 후추로 간을 맞추면 완성!"
        },
        {
            category: 'cooking',
            title: '프렌치 어니언 스프',
            desc: '양파를 카라멜라이징하는 인내의 시간.',
            img: 'https://images.unsplash.com/photo-1583032015879-e50d22792c90?auto=format&fit=crop&w=600',
            tags: ['#FrenchOnion', '#Classic'],
            recipe: "1. 양파 4개를 채 썰어 버터에 갈색이 될 때까지 볶습니다 (약 40분).\n2. 화이트 와인 조금과 비프 스톡을 넣고 끓입니다.\n3. 바게트 빵과 그뤼에르 치즈를 올려 오븐에 굽습니다."
        },
        {
            category: 'cooking',
            title: '엄마표 김치찌개',
            desc: '잘 익은 김치와 돼지고기의 완벽한 조화.',
            img: 'https://images.unsplash.com/photo-1620311510495-9eaf835d71f9?auto=format&fit=crop&w=600',
            tags: ['#KoreanFood', '#Kimchi'],
            recipe: "1. 돼지고기를 먼저 볶다가 김치를 넣고 충분히 볶습니다.\n2. 쌀뜨물을 붓고 푹 끓입니다.\n3. 고춧가루, 간장, 다진 마늘로 간을 합니다.\n4. 마지막에 두부와 파를 넣습니다."
        },
        {
            category: 'travel',
            title: '포르투의 붉은 지붕',
            desc: '강변에 앉아 바라보던 노을.',
            img: 'https://images.unsplash.com/photo-1555881400-74d7acaacd8b?auto=format&fit=crop&w=600',
            tags: ['#Porto', '#Sunset']
        }
    ];

    function renderPosts() {
        document.querySelectorAll('.items').forEach(el => el.innerHTML = '');
        posts.forEach((post, index) => {
            const cardHtml = `
                <div class="card" onclick="openModal(${index})" data-search="${post.tags.join(' ')} ${post.title}">
                    <img src="${post.img}" class="card-img" alt="${post.title}">
                    <div class="card-content">
                        <h3 class="card-title">${post.title}</h3>
                        <p class="card-desc">${post.desc}</p>
                        <div class="tags">${post.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
                    </div>
                </div>
            `;
            const container = document.querySelector(`#${post.category}-col .items`);
            container.insertAdjacentHTML('beforeend', cardHtml);
        });
    }

    // 모달 제어 함수
    function openModal(index) {
        const post = posts[index];
        if (!post.recipe) return; // 레시피가 없으면 열지 않음
        
        document.getElementById('modalTitle').innerText = post.title;
        document.getElementById('modalRecipe').innerText = post.recipe;
        document.getElementById('recipeModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('recipeModal').style.display = 'none';
    }

    function filterPosts() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            const content = card.getAttribute('data-search').toLowerCase();
            card.style.display = content.includes(query) ? 'block' : 'none';
        });
    }

    renderPosts();
</script>

</body>
</html>
